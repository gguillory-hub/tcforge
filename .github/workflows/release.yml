name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  package-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-libsndfile
            autoconf
            automake
            curl
            libtool
            make
            tar
      - name: Build ltcdump
        shell: msys2 {0}
        run: bash release/build-ltcdump-msys2.sh
      - name: Install release tools
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
      - name: Prepare dependency directory
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p deps
          for tool in ffmpeg ffprobe ltcdump; do
            src="$(command -v "$tool" || command -v "$tool.exe")"
            cp "$src" "deps/$tool.exe"
          done
          ldd deps/*.exe |
            awk '/\/mingw64\/bin\// { if ($1 ~ /^\//) print $1; else print $3 }' |
            sort -u |
            while read -r dll; do
              cp "$dll" deps/
            done
      - name: Package Windows
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $commit = "${{ github.sha }}"
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          ./release/package.ps1 -Platform windows-x64 -Version $version -Commit $commit -Date $date -DependencyDir deps -BuildInstaller
      - uses: actions/upload-artifact@v4
        with:
          name: tcforge-windows-x64
          path: |
            dist/tcforge-windows-x64.zip
            dist/tcforge-windows-x64-setup.exe

  publish:
    needs: package-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            Unsigned tcforge release for Windows x64.

            Windows users may see SmartScreen warnings because this first installer is unsigned.

            macOS packaging is paused until it can be signed and notarized with an Apple Developer certificate.
