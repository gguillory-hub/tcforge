name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  package-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-libsndfile
            autoconf
            automake
            curl
            libtool
            make
            tar
      - name: Build ltcdump
        shell: msys2 {0}
        run: bash release/build-ltcdump-msys2.sh
      - name: Install release tools
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
      - name: Prepare dependency directory
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p deps
          for tool in ffmpeg ffprobe ltcdump; do
            src="$(command -v "$tool" || command -v "$tool.exe")"
            cp "$src" "deps/$tool.exe"
          done
          ldd deps/*.exe |
            awk '/\/mingw64\/bin\// { if ($1 ~ /^\//) print $1; else print $3 }' |
            sort -u |
            while read -r dll; do
              cp "$dll" deps/
            done
          echo "MINGW64_BIN=$(cygpath -w /mingw64/bin)" >> "$GITHUB_ENV"
          echo "MINGW64_GCC=$(cygpath -w /mingw64/bin/gcc.exe)" >> "$GITHUB_ENV"
      - name: Build Windows GUI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path prebuilt | Out-Null
          $env:PATH = "$env:MINGW64_BIN;$env:PATH"
          $env:CC = "$env:MINGW64_GCC"
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $version = "${{ github.ref_name }}"
          $commit = "${{ github.sha }}"
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $pkg = "github.com/gguillory-hub/tcforge/internal/tcforge"
          go build -tags gui -trimpath -ldflags "-H=windowsgui -X $pkg.version=$version -X $pkg.commit=$commit -X $pkg.date=$date" -o prebuilt\tcforge-gui.exe .\cmd\tcforge-gui
      - name: Add GUI runtime dependencies
        shell: msys2 {0}
        run: |
          set -euo pipefail
          ldd prebuilt/tcforge-gui.exe |
            awk '/\/mingw64\/bin\// { if ($1 ~ /^\//) print $1; else print $3 }' |
            sort -u |
            while read -r dll; do
              cp "$dll" deps/
            done
      - name: Package Windows
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $commit = "${{ github.sha }}"
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          ./release/package.ps1 -Platform windows-x64 -Version $version -Commit $commit -Date $date -DependencyDir deps -GUIBinary prebuilt\tcforge-gui.exe -BuildInstaller
      - name: Smoke test Windows package
        shell: pwsh
        run: |
          if (!(Test-Path dist\tcforge-windows-x64\tcforge.exe)) { throw "Missing tcforge.exe in staged package" }
          if (!(Test-Path dist\tcforge-windows-x64\tcforge-gui.exe)) { throw "Missing tcforge-gui.exe in staged package" }
          if (!(Test-Path dist\tcforge-windows-x64.zip)) { throw "Missing portable zip" }
          if (!(Test-Path dist\tcforge-windows-x64-setup.exe)) { throw "Missing installer" }
          & .\dist\tcforge-windows-x64\tcforge.exe --version
      - uses: actions/upload-artifact@v4
        with:
          name: tcforge-windows-x64
          path: |
            dist/tcforge-windows-x64.zip
            dist/tcforge-windows-x64-setup.exe

  publish:
    needs: package-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            Windows public alpha release for tcforge.

            This release includes:
            - tcforge-gui.exe desktop app
            - tcforge.exe command-line tool
            - bundled ffmpeg, ffprobe, and ltcdump tools
            - portable ZIP and unsigned installer EXE

            Windows users may see SmartScreen warnings because this alpha installer is unsigned. The installer does not require Go, Chocolatey, Homebrew, or a separate FFmpeg install. Uninstall removes the app folder and the tcforge user PATH entry.

            macOS packaging is paused until it can be signed and notarized with an Apple Developer certificate.
